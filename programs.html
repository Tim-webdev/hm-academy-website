<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Select Program</title>
  <link rel="stylesheet" href="Css/programs.css">
</head>
<body>
  <div class="container">
    <h2>Select a Course Package</h2>
    <select id="program-select">
      <option value="">-- choose your program --</option>
      <option value="compApp-c2">Computer Appreciation – ₦67,500</option>
      <option value="graphic-c2">Graphic Design Certificate – ₦118,500</option>
      <option value="network-c2">Networking Certificate – ₦111,800</option>
      <option value="coding-c2">Coding Certificate – ₦188,500</option>
      <option value="digital-c2">Digital Marketing Certificate – ₦168,500</option>
      <option value="video-c2">Video Editing Certificate – ₦148,500</option>
      <!-- Add other diploma options similarly -->
    </select>
    <button id="pay-btn">Pay via Paystack</button>
    <p id="message"></p>
  </div>

  <script src="https://js.paystack.co/v2/inline.js"></script>
  <script>
    const BASE_URL = 'http://localhost:5000/api/payment';
    const studentEmail = localStorage.getItem('userEmail') || prompt('Enter your email');

    document.getElementById('pay-btn').addEventListener('click', async () => {
      const sel = document.getElementById('program-select');
      if (!sel.value) return alert('Choose a program');

      const [programId, duration] = sel.value.split('-'); // e.g. compApp
      const mapping = {
        compApp: ['Computer Appreciation – Certificate', 67500],
        graphic: ['Graphic Design – Certificate', 118500],
        network: ['Networking – Certificate', 111800],
        coding: ['Coding – Certificate', 188500],
        digital: ['Digital Marketing – Certificate', 168500],
        video: ['Video Editing & Presentation – Certificate', 148500]
      };
      const [programName, amount] = mapping[programId];

      const res = await fetch(`${BASE_URL}/initialize`, {
        method: 'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: studentEmail, programId, programName, amount })
      });
      const data = await res.json();
      if (!res.ok) return document.getElementById('message').textContent = data.message;

      let handler = PaystackPop.setup({
        key: 'pk_test_xxxxxx', // your public key
        email: studentEmail,
        amount: amount * 100,
        ref: data.reference,
        callback: async function(response) {
          const verify = await fetch(`${BASE_URL}/verify/${response.reference}`);
          const result = await verify.json();
          if (result.success) {
            alert('Payment Successful! Thank you.');
            window.location.href = 'student-dashboard.html';
          } else {
            alert('Payment not verified.');
          }
        },
        onClose: function(){ alert('Payment window closed'); }
      });
      handler.openIframe();
    });
  </script>
</body>
</html>
